name: Deploy Jekyll Site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      # jekyll-build-pages writes _site as root; reclaim for later steps
      - name: Fix _site ownership
        run: sudo chown -R "$USER:$USER" _site
      - name: Publish raw markdown under /markdown
        run: |
          mkdir -p _site/markdown
          cp markdown/*.md _site/markdown/
      - name: Publish PDFs under /pdf
        env:
          PDF_DEPLOY_SOURCE_DIR: markdown
          PDF_DEPLOY_DEST_DIR: _site/pdf
          PDF_DEPLOY_COPY_TO: ""
          PDF_DEPLOY_ZIP_DIR: _site/downloads
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc weasyprint zip
          bash pdf-deploy.sh
          ls -la _site/downloads/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4