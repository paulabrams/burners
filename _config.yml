title: Burners
description: A rules-light OSR-adjacent adventure game set in the Dragon Isles
baseurl: "/burners"
url: "https://paulabrams.github.io"
markdown: kramdown
kramdown:
  auto_ids: true
  auto_id_stripping: true
exclude:
  - sims/
  - cards/
  - experiments/
  - pdf-experiments/
  - README.md
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "markdown"
    values:
      permalink: /:basename:output_ext
