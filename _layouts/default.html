<!DOCTYPE html>
<html>
  <head>
    <title>{{ page.title | default: site.title }}</title>
    <meta charset="UTF-8" />

    <!-- make the page look nice -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.css"
    />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Metamorphous&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Aniron&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-color: #2c3e50;
        --secondary-color: #34495e;
        --accent-color: #c0392b;
        --text-color: #2c3e50;
        --light-bg: #f8f9fa;
        --dark-bg: #2c3e50;
      }

      body {
        background-color: #f5f5f5;
        background-image: linear-gradient(
            rgba(255, 255, 255, 0.9),
            rgba(255, 255, 255, 0.9)
          ),
          url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%23d4c4a8' fill-opacity='0.1' fill-rule='evenodd'/%3E%3C/svg%3E"),
          linear-gradient(to right, #f3e7d3, #e6d5b8);
        color: var(--text-color);
        font-family: "Crimson Text", serif;
        line-height: 1.6;
      }

      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-family: "Aniron", "Metamorphous", cursive;
        color: var(--primary-color);
        letter-spacing: 0.05em;
        line-height: 1.25;
      }

      h1 {
        font-size: 2.5rem;
        margin: 0 0 1.25rem;
      }

      h2 {
        font-size: 1.85rem;
        margin: 2.5rem 0 1rem;
        padding-bottom: 0.35rem;
        border-bottom: 1px solid rgba(44, 62, 80, 0.18);
      }

      h3 {
        font-size: 1.35rem;
        margin: 1.75rem 0 0.75rem;
      }

      h4 {
        font-size: 1.1rem;
        margin: 1.25rem 0 0.5rem;
      }

      h5 {
        font-size: 1rem;
        margin: 1rem 0 0.4rem;
      }

      h6 {
        font-size: 0.95rem;
        margin: 0.75rem 0 0.35rem;
        font-style: italic;
      }

      details.download-list {
        margin: 0.65rem 0;
      }

      details.download-list > summary {
        font-family: "Aniron", "Metamorphous", cursive;
        font-size: 0.95rem;
        letter-spacing: 0.04em;
        color: var(--primary-color);
        cursor: pointer;
        list-style: none;
        position: relative;
        padding-left: 1.1em;
        margin-left: -1.1em; /* hang marker; "Books" lines up with Downloads */
      }

      details.download-list > summary::-webkit-details-marker {
        display: none;
      }

      details.download-list > summary::before {
        content: "▸";
        position: absolute;
        left: 0;
        color: var(--secondary-color);
      }

      details.download-list[open] > summary::before {
        content: "▾";
      }

      details.download-list ul {
        margin: 0.5rem 0 0.25rem 1.25rem;
      }

      .table-entry {
        padding: 0.5rem;
        margin: 0.25rem 0;
        border-radius: 4px;
        transition: background-color 0.3s ease;
      }

      .table-entry.highlighted {
        background: linear-gradient(135deg, #fff3cd, #ffeaa7);
        border: 3px solid #f39c12;
        font-weight: bold;
        box-shadow: 0 4px 12px rgba(243, 156, 18, 0.3);
        transform: scale(1.02);
        animation: highlight-pulse 0.6s ease-in-out;
      }

      @keyframes highlight-pulse {
        0% {
          transform: scale(1.02) rotate(0deg);
        }
        50% {
          transform: scale(1.05) rotate(0.5deg);
        }
        100% {
          transform: scale(1.02) rotate(0deg);
        }
      }

      .roll-button {
        background: linear-gradient(135deg, var(--accent-color), #e74c3c);
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        margin: 1rem 0;
      }

      .roll-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem;
      }

      .breadcrumb {
        background: transparent;
        padding: 0.5rem 0;
      }

      .breadcrumb a {
        color: var(--primary-color);
        text-decoration: none;
      }

      .breadcrumb a:hover {
        text-decoration: underline;
      }

      .page-body::after {
        content: "";
        display: table;
        clear: both;
      }

      .page-hero {
        display: block;
        width: auto;
        max-width: 100%;
        height: auto;
        border-radius: 0.5rem;
      }

      /* Wide art: spans the column at native size (capped at container width). */
      .page-hero--banner {
        margin: 0 auto 1.5rem;
        float: none;
      }

      /* Narrow art: book-plate beside the opening text. */
      .page-hero--float-right {
        float: right;
        margin: 0.25rem 0 1rem 1.5rem;
      }

      .page-hero--float-left {
        float: left;
        margin: 0.25rem 1.5rem 1rem 0;
      }
    </style>
  </head>
  <body>
    <div class="container page-body">
      {% if page.hero %}
      <img
        class="page-hero{% if page.hero_float %} page-hero--float-{{ page.hero_float }}{% else %} page-hero--banner{% endif %}"
        src="{{ page.hero | relative_url }}"
        alt="{{ page.hero_alt | default: page.title }}"
        {% unless page.hero_float %}data-hero-auto-float="right"{% endunless %}
      />
      {% endif %}
      <nav class="breadcrumb">
        <a href="{{ '/' | relative_url }}">Home</a>
        {% unless page.url == '/' %}/ {{ page.title | default: page.name }}{% endunless %}
      </nav>

      {{ content }}
    </div>
    <script>
      (function () {
        var hero = document.querySelector(".page-hero[data-hero-auto-float]");
        if (!hero) return;

        var floatSide = hero.getAttribute("data-hero-auto-float") || "right";
        var bannerMin = 900;

        function applyHeroLayout() {
          var columnWidth = hero.parentElement.clientWidth;
          var threshold = Math.min(bannerMin, columnWidth * 0.85);
          var isBanner = hero.naturalWidth >= threshold;

          hero.classList.remove(
            "page-hero--banner",
            "page-hero--float-right",
            "page-hero--float-left"
          );

          if (isBanner) {
            hero.classList.add("page-hero--banner");
          } else {
            hero.classList.add(
              floatSide === "left" ? "page-hero--float-left" : "page-hero--float-right"
            );
          }
        }

        if (hero.complete) applyHeroLayout();
        else hero.addEventListener("load", applyHeroLayout);
        window.addEventListener("resize", applyHeroLayout);
      })();
    </script>
  </body>
</html>
